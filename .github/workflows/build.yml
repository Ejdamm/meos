name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]
        config: [Release, Debug]

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }} -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_MANIFEST_FEATURES=mysql

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeOS-${{ matrix.arch }}-${{ matrix.config }}
          path: build/${{ matrix.config }}/MeOS.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        config: [Release, Debug]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            curl \
            zip \
            unzip \
            tar \
            git \
            libssl-dev \
            libsystemd-dev

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-linux-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-linux-

      - name: Install vcpkg
        run: |
          if [ ! -f "${{ github.workspace }}/vcpkg/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          fi

      - name: Configure CMake (MeOS-server, ${{ matrix.config }})
        env:
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache
        run: |
          mkdir -p ${{ github.workspace }}/vcpkg_cache
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DMEOS_USE_MYSQL=OFF

      - name: Build MeOS-server
        run: cmake --build build --target MeOS-server

      - name: Build and run C++ unit tests
        run: |
          cmake --build build --target MeOS-test
          cd build && ctest --output-on-failure --output-junit reports/ctest-junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-results-${{ matrix.config }}
          path: build/reports/
          retention-days: 14

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeOS-server-linux-${{ matrix.config }}
          path: build/MeOS-server
          if-no-files-found: error

  docker-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: meos:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: docker run -d --name meos-test -p 2009:2009 meos:ci-test

      - name: Wait for container to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:2009/meos > /dev/null 2>&1; then
              echo "Container is ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Container failed to become ready"
          docker logs meos-test
          exit 1

      - name: Verify health endpoint
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:2009/meos)
          echo "Health check status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 400 ]; then
            echo "Health check failed with status $HTTP_STATUS"
            docker logs meos-test
            exit 1
          fi

      - name: Stop container
        if: always()
        run: docker stop meos-test && docker rm meos-test || true

  docker-compose-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up -d --build --wait --wait-timeout 180

      - name: Wait for MeOS to be ready
        run: |
          for i in $(seq 1 45); do
            if curl -sf http://localhost:2009/meos > /dev/null 2>&1; then
              echo "MeOS is ready"
              exit 0
            fi
            echo "Waiting... ($i/45)"
            sleep 4
          done
          echo "MeOS failed to become ready"
          docker compose logs
          exit 1

      - name: Verify app serves frontend
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:2009/meos)
          echo "App status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 400 ]; then
            echo "App health check failed"
            docker compose logs
            exit 1
          fi

      - name: Verify MySQL is healthy
        run: |
          docker compose exec -T mysql mysqladmin ping -h localhost -u meos -pmeos
          echo "MySQL is healthy"

      - name: Verify graceful shutdown
        run: |
          docker compose down --timeout 30
          RUNNING=$(docker compose ps -q 2>/dev/null | wc -l)
          if [ "$RUNNING" -ne 0 ]; then
            echo "Containers still running after shutdown"
            exit 1
          fi
          echo "Graceful shutdown verified"

  web-quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/ui/web/package-lock.json

      - name: Install dependencies
        working-directory: src/ui/web
        run: npm ci

      - name: TypeScript type check
        working-directory: src/ui/web
        run: npm run typecheck

      - name: ESLint
        working-directory: src/ui/web
        run: npm run lint

      - name: Unit tests with coverage
        working-directory: src/ui/web
        run: npm run test:coverage

      - name: Install Playwright browsers
        working-directory: src/ui/web
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        working-directory: src/ui/web
        run: npm run test:e2e

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-reports
          path: |
            src/ui/web/reports/
            src/ui/web/test-results/
          retention-days: 14

      - name: Upload Playwright screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: src/ui/web/test-results/**/*.png
          retention-days: 7
